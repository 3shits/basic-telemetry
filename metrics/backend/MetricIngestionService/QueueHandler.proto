syntax = "proto3";

service Queue {
    rpc LoadMetric(stream LoadMetricRequest) returns (LoadMetricResponse);
    rpc GetMetric(GetMetricRequest) returns (GetMetricResponse);
    rpc StreamMetrics(StreamMetricRequest) returns ( stream StreamMetricResponse);
}

message StreamMetricRequest{
    string targetID = 1;
}

message StreamMetricResponse{
     repeated MetricResponse metric = 1;
}

message LoadMetricRequest {
    MetricResponse data = 1;
}

message LoadMetricResponse {
    string message = 1;
}
message GetMetricRequest {

    string targetID = 1;
}

message GetMetricResponse {
    repeated MetricResponse metric = 1;
}

message RawMetrics {
   double cpu=1;
  double memory=2;
  double latency=3;
  int32 failed_req=4;
  int32 failed_logins=5;
  int32 total_req=6;
  int32 total_logins=7;
}

message MetricResponse {
    string timestamp = 1;
    RawMetrics data = 2;
}
